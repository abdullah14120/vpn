name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # إضافة كاش تلقائي للمكتبات

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          # توليد الـ wrapper أولاً إذا لم يكن موجوداً
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          # تنظيف المشروع وإعادة المزامنة مع تحميل التبعيات
          ./gradlew clean assembleDebug --stacktrace --refresh-dependencies

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
